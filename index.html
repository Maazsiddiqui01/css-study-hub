<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#C6506E"><meta name="robots" content="noindex">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>CSS Study Hub</title><link rel="stylesheet" href="styles.css"></head><body>
<header class="top"><div class="brand"><span class="logo">📚</span>
<div><div class="tt">CSS Study Hub</div><div class="ss">Every lecture, distilled</div></div></div>
<button id="install" class="install" hidden>⤓ Install</button></header>
<div id="kpis" class="kpis"></div>
<div class="bar"><i id="barfill" style="width:0%"></i></div>
<div id="barlab" class="barlab"></div>
<div class="controls">
<input id="q" class="search" type="search" placeholder="Search topics, laws, terms…" autocomplete="off">
<div class="row"><div id="subs" class="chips"></div>
<select id="sort" class="sort" aria-label="Sort">
<option value="new">Newest</option><option value="old">Oldest</option>
<option value="az">A–Z</option><option value="long">Longest</option></select></div>
<div class="row"><div id="statuses" class="chips"></div></div></div>
<main id="results"></main>
<footer class="foot"><span id="count"></span> · works offline · add to your home screen</footer>
<script src="app.js"></script></body></html>
